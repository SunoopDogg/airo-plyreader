services:
  airo-plyreader:
    build:
      context: .
    image: trixie-slim:uv-nvm
    container_name: airo-plyreader
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/airo-plyreader
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    ipc: host
    tty: true

  airo-plyreader-gpu:
    extends:
      service: airo-plyreader
    container_name: airo-plyreader-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu